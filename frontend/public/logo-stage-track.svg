<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="16" y1="32" x2="48" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- Cercle principal avec ombre -->
  <g filter="url(#shadow)">
    <circle cx="32" cy="32" r="28" fill="url(#logoGrad)"/>
  </g>
  <!-- Flèche stylisée (plus discrète) -->
  <path d="M32 44V24" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <path d="M26 30l6-6 6 6" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Texte ST centré -->
  <text x="32" y="39" text-anchor="middle" font-family="'Segoe UI', 'Montserrat', Arial, sans-serif" font-size="22" font-weight="bold" fill="url(#textGrad)" letter-spacing="2">ST</text>
</svg>
